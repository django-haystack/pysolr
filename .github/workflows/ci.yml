name: ci
permissions:
  contents: read
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  test:
    name: Test (Python ${{ matrix.python }}, Solr ${{ matrix.solr }})
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t"]
        solr: ["9", "10"]
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: ${{ matrix.python }}
      SOLR_VERSION: ${{ matrix.solr }}
      UV_LOCKED: 1
      UV_NO_DEV: 1
      PYTHONUNBUFFERED: 1
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.29"

      - name: Run tests
        run: uv run --extra=solrcloud run-tests.py
